  /rvc/{rvcId}/fiscaldb/menuitems:
    get:
      tags:
        - FiscalDB
      summary: Получить все позиции меню RVC
      description: "Проксирует запрос к FiscalDB сервису для получения списка всех позиций меню \nс их ЕГАИС-атрибутами, штрихкодами и количеством марок\n"
      operationId: getFiscalDbMenuItems
      parameters:
        - name: rvcId
          in: path
          required: true
          description: Идентификатор RVC (Revenue Center) для маршрутизации к целевому FiscalDB сервису
          schema:
            type: integer
            format: int32
          example: 101
        - in: header
          name: X-Correlation-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор транзакции запроса
        - in: header
          name: X-Request-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор запроса
      responses:
        200:
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Информация о позиции меню с ЕГАИС-атрибутами
                  properties:
                    objnum:
                      type: integer
                      format: int32
                      description: Уникальный идентификатор позиции
                    name:
                      type: string
                      nullable: true
                      description: Наименование позиции
                    volume:
                      type: number
                      format: decimal
                      nullable: true
                      description: Объём
                    unit:
                      type: string
                      nullable: true
                      description: Единица измерения
                    marktype:
                      type: integer
                      nullable: true
                      description: Тип маркировки
                    groupid:
                      type: integer
                      nullable: true
                      description: ID группы
                    cocktid:
                      type: integer
                      nullable: true
                      description: ID коктейля
                    barcodes:
                      type: array
                      items:
                        type: string
                      description: Список штрихкодов
                    marksCount:
                      type: integer
                      description: Количество марок
        502:
          description: Ошибка при обращении к FiscalDB сервису
          content:
