          nullable: true
          description: Номер сотрудника
        writeoff:
          type: integer
          format: int32
          nullable: true
          description: Признак продажи (writeoff)
  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            description: Стандартная структура ошибки
            type: object
            required:
              - code
              - message
              - service
              - operation
              - product
            properties:
              code:
                description: Код ошибки
                type: integer
                example: 10000
              message:
                description: Описание ошибки
                type: string
                example: Invalid input parameters
              service:
                description: Сервис, в котором произошла ошибка
                type: string
                example: hrs-simphony-sync
              operation:
                description: Операция, в которой произошла ошибка
                type: string
                example: CreateMenuItem
              product:
                description: Продукт, в котором произошла ошибка
                type: string
                example: HRS
              cause:
                description: Дополнительная информация о причине ошибки
                type: object
                nullable: true
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            description: Стандартная структура ошибки
            type: object
            required:
              - code
              - message
              - service
              - operation
              - product
            properties:
              code:
                description: Код ошибки
                type: integer
                example: 10000
              message:
                description: Описание ошибки
                type: string
