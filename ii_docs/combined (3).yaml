  /admin/cache/stats:
    get:
      summary: Получить статистику по кэшам системы
      operationId: getCacheStats
      tags:
        - Admin
      security:
        - BearerAuth:
            []
      parameters:
        - in: header
          name: X-User-Id
          schema:
            type: string
          description: Идентификатор пользователя (опционально)
        - in: header
          name: X-Correlation-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор транзакции запроса
        - in: header
          name: X-Request-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор запроса
      responses:
        200:
          description: Детальная статистика получена
          content:
            application/json:
              schema:
                description: Детальная статистика по всем кэшам системы
                type: object
                required:
                  - enabled
                  - total_size
                  - total_max_size
                  - total_hits
                  - total_misses
                  - total_evictions
                  - total_insertions
                  - total_updates
                  - total_requests
                  - hit_rate
                  - utilization
                  - caches
                properties:
                  enabled:
                    description: Статус включения кэширования
                    type: boolean
                    example: true
                  total_size:
                    description: Общее количество элементов во всех кэшах
                    type: integer
                    minimum: 0
                    example: 450
                  total_max_size:
                    description: Максимальная емкость всех кэшей
                    type: integer
                    minimum: 0
                    example: 1500
                  total_hits:
                    description: Общее количество попаданий
                    type: integer
                    format: int64
                    minimum: 0
                    example: 1250
                  total_misses:
                    description: Общее количество промахов
                    type: integer
                    format: int64
                    minimum: 0
                    example: 180
                  total_evictions:
                    description: Общее количество вытеснений
                    type: integer
                    format: int64
                    minimum: 0
                    example: 25
                  total_insertions:
                    description: Общее количество вставок
                    type: integer
                    format: int64
                    minimum: 0
                    example: 475
                  total_updates:
                    description: Общее количество обновлений
                    type: integer
                    format: int64
                    minimum: 0
                    example: 120
                  total_requests:
                    description: Общее количество запросов
                    type: integer
                    format: int64
                    minimum: 0
                    example: 1430
                  hit_rate:
                    description: Общий процент попаданий (0.0 - 1.0)
                    type: number
                    format: double
                    minimum: 0
                    maximum: 1
                    example: 0.874
                  utilization:
                    description: Использование кэша (0.0 - 1.0)
                    type: number
                    format: double
                    minimum: 0
                    maximum: 1
                    example: 0.3
                  uptime_seconds:
                    description: Время работы кэш-менеджера в секундах
                    type: integer
                    format: int64
                    minimum: 0
                    example: 3600
                  caches:
                    description: Детальная информация по каждому кэшу
                    type: array
                    items:
                      description: Информация об отдельном кэше
                      type: object
                      required:
                        - name
                        - current_size
                        - max_size
                        - hits
                        - misses
                        - evictions
                        - insertions
                        - updates
                        - hit_rate
                        - total_requests
                        - utilization
                      properties:
                        name:
                          description: Имя кэша
                          type: string
                          enum:
                            - menu_items
                            - major_groups
                            - family_groups
                            - report_groups
                            - rvc_hierarchy
                            - screen_lookups
                            - screen_lookups_by_hier
                          example: menu_items
                        current_size:
                          description: Текущее количество элементов в кэше
                          type: integer
                          minimum: 0
                          example: 0
                        max_size:
                          description: Максимальный размер кэша
                          type: integer
                          minimum: 0
                          example: 1000
                        hits:
                          description: Количество попаданий в кэш
                          type: integer
                          format: int64
                          minimum: 0
                          example: 0
                        misses:
                          description: Количество промахов кэша
                          type: integer
                          format: int64
                          minimum: 0
                          example: 0
                        evictions:
                          description: Количество вытеснений из кэша
                          type: integer
                          format: int64
                          minimum: 0
                          example: 0
                        insertions:
                          description: Количество вставок в кэш
                          type: integer
                          format: int64
                          minimum: 0
                          example: 0
                        updates:
                          description: Количество обновлений в кэше
                          type: integer
                          format: int64
                          minimum: 0
                          example: 0
                        hit_rate:
                          description: Hit rate данного кэша (0.0 - 1.0)
                          type: number
                          format: double
                          minimum: 0
                          maximum: 1
                          example: 0.0
                        total_requests:
                          description: Общее количество запросов к кэшу
                          type: integer
                          format: int64
                          minimum: 0
                          example: 0
                        utilization:
                          description: Использование кэша (0.0 - 1.0)
                          type: number
                          format: double
                          minimum: 0
                          maximum: 1
                          example: 0.0
        401:
          description: Ошибка авторизации
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        500:
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                description: Стандартная структура ошибки
                type: object
                required:
                  - code
                  - message
                  - service
                  - operation
                  - product
                properties:
                  code:
                    description: Код ошибки
                    type: integer
                    example: 10000
                  message:
                    description: Описание ошибки
                    type: string
                    example: Invalid input parameters
                  service:
                    description: Сервис, в котором произошла ошибка
                    type: string
                    example: hrs-simphony-sync
                  operation:
                    description: Операция, в которой произошла ошибка
                    type: string
                    example: CreateMenuItem
                  product:
                    description: Продукт, в котором произошла ошибка
                    type: string
                    example: HRS
                  cause:
                    description: Дополнительная информация о причине ошибки
                    type: object
                    nullable: true
