openapi: 3.0.3
info:
  title: HRS Simphony items synchronise
  version: 1.0.0
  description: API для создания элементов меню с отслеживанием статуса синхронизации.
  contact:
    name: Артем Брюховецкий
    url: https://shawen.dev
    email: artem.bryuhovetskiy@mriyaresort.com
tags:
  - name: Health
    description: Проверка состояния сервиса
  - name: Menu Items
    description: Операции с элементами меню
  - name: Reference Data
    description: Справочные данные
  - name: RVC
    description: Revenue Center операции
  - name: Admin
    description: Административные операции (требуется авторизация)
  - name: Tables
    description: Операции с классами столов
  - name: Checks
    description: Операции с кассовыми чеками
  - name: FiscalDB
    description: FiscalDB Proxy - проксирование запросов к FiscalDB сервисам
  - name: EGAIS
    description: EGAIS Proxy - проксирование запросов к EGAIS Sync сервисам
paths:
  /health:
    get:
      summary: Проверка состояния сервиса
      operationId: healthCheck
      tags:
        - Health
      responses:
        200:
          description: Сервис работает нормально
          content:
            application/json:
              schema:
                description: Информация о состоянии сервиса
                type: object
                required:
                  - status
                  - uptime_sec
                properties:
                  status:
                    description: Общий статус сервиса
                    type: string
                    enum:
                      - healthy
                    example: healthy
                  uptime_sec:
                    description: Время работы сервиса в секундах
                    type: integer
                    format: int64
                    minimum: 0
                    example: 416
                  database:
                    description: Состояние подключения к базе данных
                    type: object
                    required:
                      - connected
                      - status
                    properties:
                      connected:
                        description: Статус подключения к БД
                        type: boolean
                        example: true
                      status:
                        description: Детальный статус БД
                        type: string
                        enum:
                          - healthy
                          - degraded
                          - not_initialized
                          - check_failed
                          - initialization_check_failed
                        example: healthy
                      total_connections:
                        description: Общее количество соединений в пуле
                        type: integer
                        minimum: 0
                        example: 2
                      active_connections:
                        description: Количество активных соединений
                        type: integer
                        minimum: 0
                        example: 0
                      available_connections:
                        description: Количество доступных соединений
                        type: integer
                        minimum: 0
                        example: 2
                      last_error:
                        description: Последняя ошибка подключения (если есть)
                        type: string
                        example: Connection timeout
                  menu_service:
                    description: Состояние сервиса меню
                    type: object
                    required:
                      - initialized
                      - status
                    properties:
                      initialized:
                        description: Флаг инициализации сервиса
                        type: boolean
                        example: true
                      status:
                        description: Детальный статус сервиса меню
                        type: string
                        enum:
                          - operational
                          - not_ready
                          - unavailable
                          - check_failed
                        example: operational
                      cache_items:
                        description: Количество элементов в кэше (опционально)
                        type: integer
                        minimum: 0
                        example: 0
                      major_groups:
                        description: Количество используемых major groups (опционально)
                        type: integer
                        minimum: 0
                        example: 0
                  cache:
                    description: Детальная статистика кэша
                    type: object
                    required:
                      - enabled
                    properties:
                      enabled:
                        description: Включен ли кэш
                        type: boolean
                        example: true
                      caches:
                        description: Список всех кэшей с их статистикой
                        type: array
                        items:
                          description: Информация об отдельном кэше
                          type: object
                          required:
                            - name
                            - current_size
                            - max_size
                            - hits
                            - misses
                            - evictions
                            - insertions
                            - updates
                            - hit_rate
                            - total_requests
                            - utilization
                          properties:
                            name:
                              description: Имя кэша
                              type: string
                              enum:
                                - menu_items
                                - major_groups
                                - family_groups
                                - report_groups
                                - rvc_hierarchy
                                - screen_lookups
                                - screen_lookups_by_hier
                              example: menu_items
                            current_size:
                              description: Текущее количество элементов в кэше
                              type: integer
                              minimum: 0
                              example: 0
                            max_size:
                              description: Максимальный размер кэша
                              type: integer
                              minimum: 0
                              example: 1000
                            hits:
                              description: Количество попаданий в кэш
                              type: integer
                              format: int64
                              minimum: 0
                              example: 0
                            misses:
                              description: Количество промахов кэша
                              type: integer
                              format: int64
                              minimum: 0
                              example: 0
                            evictions:
                              description: Количество вытеснений из кэша
                              type: integer
                              format: int64
                              minimum: 0
                              example: 0
                            insertions:
                              description: Количество вставок в кэш
                              type: integer
                              format: int64
                              minimum: 0
                              example: 0
                            updates:
                              description: Количество обновлений в кэше
                              type: integer
                              format: int64
                              minimum: 0
                              example: 0
                            hit_rate:
                              description: Hit rate данного кэша (0.0 - 1.0)
                              type: number
                              format: double
                              minimum: 0
                              maximum: 1
                              example: 0.0
                            total_requests:
                              description: Общее количество запросов к кэшу
                              type: integer
                              format: int64
                              minimum: 0
                              example: 0
                            utilization:
                              description: Использование кэша (0.0 - 1.0)
                              type: number
                              format: double
                              minimum: 0
                              maximum: 1
                              example: 0.0
                      overall_hit_rate:
                        description: Общий hit rate всех кэшей (0.0 - 1.0)
                        type: number
                        format: double
                        minimum: 0
                        maximum: 1
                        example: 0.0
                      total_hits:
                        description: Общее количество попаданий во все кэши
                        type: integer
                        format: int64
                        minimum: 0
                        example: 0
                      total_misses:
                        description: Общее количество промахов во все кэши
                        type: integer
                        format: int64
                        minimum: 0
                        example: 0
                      total_evictions:
                        description: Общее количество вытеснений из всех кэшей
                        type: integer
                        format: int64
                        minimum: 0
                        example: 0
                      total_cache_size:
                        description: Общий размер всех кэшей (количество элементов)
                        type: integer
                        minimum: 0
                        example: 0
                      max_cache_size:
                        description: Максимальный общий размер всех кэшей
                        type: integer
                        minimum: 0
                        example: 1500
                      cache_utilization:
                        description: Использование кэша (0.0 - 1.0)
                        type: number
                        format: double
                        minimum: 0
                        maximum: 1
                        example: 0.0
                      uptime_seconds:
                        description: Время работы кэша в секундах
                        type: integer
                        format: int64
                        minimum: 0
                        example: 416
                      message:
                        description: Сообщение при отключённом кэше
                        type: string
                        example: Cache is disabled
                      status:
                        description: Статус при ошибке получения статистики
                        type: string
                        example: error
                      error:
                        description: Описание ошибки
                        type: string
                        example: Cache manager not available
                  cache_summary:
                    description: Краткая сводка по кэшу для быстрого просмотра
                    type: object
                    required:
                      - enabled
                    properties:
                      enabled:
                        description: Включен ли кэш
                        type: boolean
                        example: true
                      hit_rate:
                        description: Общий hit rate (0.0 - 1.0)
                        type: number
                        format: double
                        minimum: 0
                        maximum: 1
                        example: 0.0
                      total_size:
                        description: Общий размер кэша (количество элементов)
                        type: integer
                        minimum: 0
                        example: 0
                      utilization:
                        description: Использование кэша (0.0 - 1.0)
                        type: number
                        format: double
                        minimum: 0
                        maximum: 1
                        example: 0.0
                      status:
                        description: Статус кэша (появляется при ошибках)
                        type: string
                        enum:
                          - not_initialized
                          - statistics_unavailable
                          - error
                          - unknown_error
                          - critical_error
                        example: not_initialized
                  fiscaldb_adapters:
                    description: Состояние подключений к FiscalDB адаптерам
                    type: object
                    required:
                      - configured
                      - status
                    properties:
                      configured:
                        description: Наличие FiscalDB адаптеров в конфигурации
                        type: boolean
                        example: true
                      total:
                        description: Общее количество уникальных адаптеров
                        type: integer
                        minimum: 0
                        example: 2
                      healthy:
                        description: Количество доступных адаптеров
                        type: integer
                        minimum: 0
                        example: 1
                      status:
                        description: Агрегированный статус всех адаптеров
                        type: string
                        enum:
                          - all_healthy
                          - degraded
                          - all_unavailable
                          - not_configured
                          - check_failed
                          - critical_error
                          - unknown_error
                        example: all_healthy
                      error:
                        description: Сообщение об ошибке (при status = check_failed)
                        type: string
                      adapters:
                        description: Детальный статус каждого уникального адаптера
                        type: array
                        items:
                          description: Статус здоровья одного FiscalDB адаптера
                          type: object
                          required:
                            - endpoint
                            - rvc_ids
                            - reachable
                            - response_time_ms
                          properties:
                            endpoint:
                              description: URL адаптера (scheme://host:port)
                              type: string
                              example: http://egais-service-1:5000
                            rvc_ids:
                              description: Список RVC, привязанных к данному адаптеру
                              type: array
                              items:
                                type: integer
                              example:
                                - 101
                                - 102
                                - 103
                            reachable:
                              description: Доступен ли адаптер
                              type: boolean
                              example: true
                            response_time_ms:
                              description: Время ответа в миллисекундах
                              type: integer
                              format: int64
                              minimum: 0
                              example: 45
                            status:
                              description: Статус от адаптера (из JSON ответа /health)
                              type: string
                              example: Healthy
                            http_status:
                              description: HTTP статус код ответа /health
                              type: integer
                              example: 200
                            error:
                              description: Сообщение об ошибке (если reachable = false)
                              type: string
                              example: Connection refused
  /menu-item:
    put:
      summary: Создать элемент меню
      operationId: createMenuItem
      tags:
        - Menu Items
      parameters:
        - in: header
          name: X-User-Id
          schema:
            type: string
          description: Идентификатор пользователя (опционально)
        - in: header
          name: X-Correlation-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор транзакции запроса
        - in: header
          name: X-Request-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор запроса
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: Запрос для создания элемента меню
              required:
                - name
                - stringNumberId
                - majGrpObjNum
                - famGrpObjNum
                - hierStrucId
                - menuItemClass
                - price
              type: object
              properties:
                name:
                  description: Наименование позиции меню
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: ^[a-zA-Zа-яА-ЯёЁ0-9\s\-_\.\(\)]+$
                  example: Пицца Маргарита
                name2:
                  description: Наименование позиции меню
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: ^[a-zA-Zа-яА-ЯёЁ0-9\s\-_\.\(\)]+$
                  example: Пицца Маргарита
                stringNumberId:
                  description: Уникальный номер позиции (идентификатор)
                  type: integer
                  minimum: 1
                  example: 14
                price:
                  description: Цена позиции
                  type: number
                  format: double
                  minimum: 0
                  example: 350.00
                hierStrucId:
                  description: ID иерархической структуры (аутлета)
                  type: integer
                  minimum: 1
                  example: 1
                famGrpObjNum:
                  description: Значение справочника семейной группы
                  type: integer
                  minimum: 0
                  example: 100
                majGrpObjNum:
                  description: Значение справочника основной группы
                  type: integer
                  minimum: 1
                  example: 1000001
                menuItemClass:
                  description: Класс позиции меню (опционально)
                  type: integer
                  nullable: true
                  example: 2001
                sluindex:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 160
                slu2:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu3:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu4:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu5:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu6:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu7:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu8:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
      responses:
        200:
          description: Элемент меню успешно создан
          content:
            application/json:
              schema:
                description: Ответ с данными элемента меню
                required:
                  - stringNumberId
                  - name
                  - price
                  - hierStrucId
                  - famGrpObjNum
                  - majGrpObjNum
                  - created
                  - success
                type: object
                properties:
                  stringNumberId:
                    description: Уникальный номер позиции (идентификатор)
                    type: integer
                    example: 14
                  name:
                    description: Наименование позиции меню
                    type: string
                    example: Пицца Маргарита
                  name2:
                    description: Дополнительное наименование позиции
                    type: string
                    nullable: true
                    example: ~
                  price:
                    description: Цена позиции
                    type: number
                    format: double
                    example: 350.00
                  hierStrucId:
                    description: ID иерархической структуры
                    type: integer
                    example: 1
                  famGrpObjNum:
                    description: Значение справочника семейной группы
                    type: integer
                    example: 100
                  majGrpObjNum:
                    description: Значение справочника основной группы
                    type: integer
                    example: 1000001
                  menuItemClass:
                    description: Класс позиции меню
                    type: integer
                    nullable: true
                    example: 2001
                  sluindex:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 160
                  slu2:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  slu3:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  slu4:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  slu5:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  slu6:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  slu7:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  slu8:
                    description: Индекс позиции в меню (опционально)
                    type: integer
                    nullable: true
                    example: 1
                  created:
                    description: Дата и время создания
                    type: string
                    format: date-time
                    example: 2024-03-15T10:30:00Z
                  success:
                    description: Статус успешного выполнения запроса
                    type: boolean
                    example: true
        400:
          description: Некорректный запрос
          content:
            application/json:
              schema:
                description: Стандартная структура ошибки
                type: object
                required:
                  - code
                  - message
                  - service
                  - operation
                  - product
                properties:
                  code:
                    description: Код ошибки
                    type: integer
                    example: 10000
                  message:
                    description: Описание ошибки
                    type: string
                    example: Invalid input parameters
                  service:
                    description: Сервис, в котором произошла ошибка
                    type: string
                    example: hrs-simphony-sync
                  operation:
                    description: Операция, в которой произошла ошибка
                    type: string
                    example: CreateMenuItem
                  product:
                    description: Продукт, в котором произошла ошибка
                    type: string
                    example: HRS
                  cause:
                    description: Дополнительная информация о причине ошибки
                    type: object
                    nullable: true
        404:
          description: Ресурс не найден
          content:
            application/json:
              schema:
                description: Стандартная структура ошибки
                type: object
                required:
                  - code
                  - message
                  - service
                  - operation
                  - product
                properties:
                  code:
                    description: Код ошибки
                    type: integer
                    example: 10000
                  message:
                    description: Описание ошибки
                    type: string
                    example: Invalid input parameters
                  service:
                    description: Сервис, в котором произошла ошибка
                    type: string
                    example: hrs-simphony-sync
                  operation:
                    description: Операция, в которой произошла ошибка
                    type: string
                    example: CreateMenuItem
                  product:
                    description: Продукт, в котором произошла ошибка
                    type: string
                    example: HRS
                  cause:
                    description: Дополнительная информация о причине ошибки
                    type: object
                    nullable: true
        500:
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                description: Стандартная структура ошибки
                type: object
                required:
                  - code
                  - message
                  - service
                  - operation
                  - product
                properties:
                  code:
                    description: Код ошибки
                    type: integer
                    example: 10000
                  message:
                    description: Описание ошибки
                    type: string
                    example: Invalid input parameters
                  service:
                    description: Сервис, в котором произошла ошибка
                    type: string
                    example: hrs-simphony-sync
                  operation:
                    description: Операция, в которой произошла ошибка
                    type: string
                    example: CreateMenuItem
                  product:
                    description: Продукт, в котором произошла ошибка
                    type: string
                    example: HRS
                  cause:
                    description: Дополнительная информация о причине ошибки
                    type: object
                    nullable: true
    patch:
      summary: Обновить элемент меню
      operationId: updateMenuItem
      tags:
        - Menu Items
      parameters:
        - in: header
          name: X-User-Id
          schema:
            type: string
          description: Идентификатор пользователя (опционально)
        - in: header
          name: X-Correlation-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор транзакции запроса
        - in: header
          name: X-Request-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор запроса
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: Запрос для обновления элемента меню
              required:
                - stringNumberId
                - name
                - price
                - hierStrucId
                - famGrpObjNum
                - majGrpObjNum
              type: object
              properties:
                stringNumberId:
                  description: Уникальный номер позиции (идентификатор)
                  type: integer
                  minimum: 1
                  example: 14
                name:
                  description: Наименование позиции меню
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: ^[a-zA-Zа-яА-ЯёЁ0-9\s\-_\.\(\)]+$
                  example: Пицца Маргарита
                price:
                  description: Цена позиции
                  type: number
                  format: double
                  minimum: 0
                  example: 350.00
                hierStrucId:
                  description: ID иерархической структуры (аутлета)
                  type: integer
                  minimum: 1
                  example: 1
                famGrpObjNum:
                  description: Значение справочника семейной группы
                  type: integer
                  minimum: 0
                  example: 100
                majGrpObjNum:
                  description: Значение справочника основной группы
                  type: integer
                  minimum: 1
                  example: 1000001
                menuItemClass:
                  description: Класс позиции меню (опционально)
                  type: integer
                  nullable: true
                  example: 2001
                isVisible:
                  description: Флаг видимости позиции в меню
                  type: integer
                  enum:
                    - 0
                    - 1
                  example: 1
                sluindex:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 160
                slu2:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu3:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu4:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu5:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
                slu6:
                  description: Индекс позиции в меню (опционально)
                  type: integer
                  nullable: true
                  example: 1
