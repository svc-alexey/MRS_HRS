  parameters:
    XUserId:
      in: header
      name: X-User-Id
      schema:
        type: string
      description: Идентификатор пользователя (опционально)
    XCorrelationId:
      in: header
      name: X-Correlation-Id
      schema:
        type: string
        format: uuid
      required: true
      description: Уникальный идентификатор транзакции запроса
    XRequestId:
      in: header
      name: X-Request-Id
      schema:
        type: string
        format: uuid
      required: true
      description: Уникальный идентификатор запроса
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
