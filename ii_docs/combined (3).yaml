  /rvc/{rvcId}/fiscaldb/marks/sold:
    get:
      tags:
        - FiscalDB
        - EGAIS
      summary: Выгрузка марок из проданных чеков
      description: "Проксирует запрос к GET /api/marks/sold на целевом сервисе (FiscalDB или EGAIS),\nопределяемом по rvcId. Возвращает список акцизных марок ЕГАИС из проданных чеков.\n\nЗапрос выполняет JOIN таблиц excisemarks, midef и markcodes.\nУсловие выборки: markcodes.vol > 0 (только записи с объёмом).\n\nВсе параметры опциональны — без фильтров возвращаются все проданные марки.\n"
      operationId: getEgaisMarksSold
      parameters:
        - name: rvcId
          in: path
          required: true
          description: Идентификатор RVC (Revenue Center) для маршрутизации к целевому FiscalDB сервису
          schema:
            type: integer
            format: int32
          example: 101
        - name: cknum
          in: query
          required: false
          description: Номер чека для фильтрации
          schema:
            type: integer
            format: int32
          example: 191131
        - name: dateFrom
          in: query
          required: false
          description: Начало периода включительно (формат yyyy-MM-dd или yyyy-MM-ddTHH:mm:ss)
          schema:
            type: string
            format: date-time
          example: 2026-02-18T00:00:00
        - name: dateTo
          in: query
          required: false
          description: Конец периода исключительно (формат yyyy-MM-dd или yyyy-MM-ddTHH:mm:ss)
          schema:
            type: string
            format: date-time
          example: 2026-02-19T00:00:00
        - in: header
          name: X-Correlation-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор транзакции запроса
        - in: header
          name: X-Request-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Уникальный идентификатор запроса
      responses:
        200:
          description: Список проданных марок
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: "Проданная марка ЕГАИС — запись из выгрузки чеков.\nФормируется JOIN-запросом: excisemarks + midef + markcodes (только vol > 0).\n"
                  properties:
                    id:
                      type: integer
                      format: int64
                      description: ID транзакции с маркой (excisemarks.id)
                    uws:
                      type: integer
                      format: int32
                      nullable: true
                      description: Номер станции, с которой была продажа
                    rvc:
                      type: integer
                      format: int32
                      nullable: true
                      description: Точка продаж, с которой была продажа
                    cknum:
                      type: integer
                      format: int32
                      nullable: true
                      description: Номер чека
                    ckpos:
                      type: integer
                      format: int32
                      nullable: true
                      description: Номер позиции в чеке
                    objnum:
                      type: integer
                      format: int32
                      nullable: true
                      description: Номер кнопки / позиции меню
                    name:
                      type: string
                      nullable: true
                      description: Текст (название) из позиции меню (midef.name)
                    vol:
                      type: number
                      format: decimal
                      nullable: true
                      description: Объём проданной марки (markcodes.vol)
                    code:
                      type: string
                      nullable: true
                      description: Марка ЕГАИС (markcodes.code)
                    date:
                      type: string
                      format: date-time
                      nullable: true
                      description: Дата транзакции
                    emplnum:
                      type: integer
                      format: int32
                      nullable: true
                      description: Номер сотрудника
                    writeoff:
                      type: integer
                      format: int32
                      nullable: true
                      description: Признак продажи (writeoff)
        400:
          description: Некорректные параметры запроса (например, dateFrom >= dateTo)
          content:
            application/json:
              schema:
                type: object
                description: Стандартный ответ FiscalDB адаптера
                properties:
                  success:
                    type: boolean
                    description: Признак успешности операции
                  message:
                    type: string
                    nullable: true
                    description: Сообщение о результате операции
                  data:
                    nullable: true
                    description: Дополнительные данные (опционально)
                required:
                  - success
        502:
          description: Ошибка при обращении к EGAIS сервису
          content:
            application/json:
              schema:
                description: Стандартная структура ошибки
                type: object
                required:
                  - code
                  - message
                  - service
                  - operation
                  - product
                properties:
                  code:
                    description: Код ошибки
                    type: integer
                    example: 10000
                  message:
                    description: Описание ошибки
                    type: string
                    example: Invalid input parameters
                  service:
                    description: Сервис, в котором произошла ошибка
                    type: string
                    example: hrs-simphony-sync
                  operation:
                    description: Операция, в которой произошла ошибка
                    type: string
                    example: CreateMenuItem
                  product:
                    description: Продукт, в котором произошла ошибка
                    type: string
                    example: HRS
                  cause:
                    description: Дополнительная информация о причине ошибки
                    type: object
                    nullable: true
        503:
          description: EGAIS сервис недоступен
          content:
            application/json:
              schema:
                description: Стандартная структура ошибки
                type: object
                required:
                  - code
                  - message
                  - service
                  - operation
                  - product
                properties:
                  code:
                    description: Код ошибки
