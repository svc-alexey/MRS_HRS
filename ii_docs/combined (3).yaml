components:
  schemas:
    CommonFault:
      description: Стандартная структура ошибки
      type: object
      required:
        - code
        - message
        - service
        - operation
        - product
      properties:
        code:
          description: Код ошибки
          type: integer
          example: 10000
        message:
          description: Описание ошибки
          type: string
          example: Invalid input parameters
        service:
          description: Сервис, в котором произошла ошибка
          type: string
          example: hrs-simphony-sync
        operation:
          description: Операция, в которой произошла ошибка
          type: string
          example: CreateMenuItem
        product:
          description: Продукт, в котором произошла ошибка
          type: string
          example: HRS
        cause:
          description: Дополнительная информация о причине ошибки
          type: object
          nullable: true
    HealthStatus:
      description: Информация о состоянии сервиса
      type: object
      required:
        - status
        - uptime_sec
      properties:
        status:
          description: Общий статус сервиса
          type: string
          enum:
            - healthy
          example: healthy
        uptime_sec:
          description: Время работы сервиса в секундах
          type: integer
          format: int64
          minimum: 0
          example: 416
        database:
          description: Состояние подключения к базе данных
          type: object
          required:
            - connected
            - status
          properties:
            connected:
              description: Статус подключения к БД
              type: boolean
              example: true
            status:
              description: Детальный статус БД
              type: string
              enum:
                - healthy
                - degraded
                - not_initialized
                - check_failed
                - initialization_check_failed
              example: healthy
            total_connections:
              description: Общее количество соединений в пуле
              type: integer
              minimum: 0
              example: 2
            active_connections:
              description: Количество активных соединений
              type: integer
              minimum: 0
              example: 0
            available_connections:
              description: Количество доступных соединений
              type: integer
              minimum: 0
              example: 2
            last_error:
              description: Последняя ошибка подключения (если есть)
              type: string
              example: Connection timeout
        menu_service:
          description: Состояние сервиса меню
          type: object
          required:
            - initialized
            - status
          properties:
            initialized:
              description: Флаг инициализации сервиса
              type: boolean
              example: true
            status:
              description: Детальный статус сервиса меню
              type: string
              enum:
                - operational
                - not_ready
                - unavailable
                - check_failed
              example: operational
            cache_items:
              description: Количество элементов в кэше (опционально)
              type: integer
              minimum: 0
              example: 0
            major_groups:
              description: Количество используемых major groups (опционально)
              type: integer
              minimum: 0
              example: 0
        cache:
          description: Детальная статистика кэша
          type: object
          required:
            - enabled
          properties:
            enabled:
              description: Включен ли кэш
              type: boolean
              example: true
            caches:
              description: Список всех кэшей с их статистикой
              type: array
              items:
                description: Информация об отдельном кэше
                type: object
                required:
                  - name
                  - current_size
                  - max_size
                  - hits
                  - misses
                  - evictions
                  - insertions
                  - updates
                  - hit_rate
                  - total_requests
                  - utilization
                properties:
                  name:
                    description: Имя кэша
                    type: string
                    enum:
                      - menu_items
                      - major_groups
                      - family_groups
                      - report_groups
                      - rvc_hierarchy
                      - screen_lookups
                      - screen_lookups_by_hier
                    example: menu_items
                  current_size:
                    description: Текущее количество элементов в кэше
                    type: integer
                    minimum: 0
                    example: 0
                  max_size:
                    description: Максимальный размер кэша
                    type: integer
                    minimum: 0
                    example: 1000
                  hits:
                    description: Количество попаданий в кэш
                    type: integer
                    format: int64
                    minimum: 0
                    example: 0
                  misses:
                    description: Количество промахов кэша
                    type: integer
                    format: int64
                    minimum: 0
                    example: 0
                  evictions:
                    description: Количество вытеснений из кэша
                    type: integer
                    format: int64
                    minimum: 0
                    example: 0
                  insertions:
                    description: Количество вставок в кэш
                    type: integer
                    format: int64
                    minimum: 0
                    example: 0
                  updates:
                    description: Количество обновлений в кэше
                    type: integer
                    format: int64
                    minimum: 0
                    example: 0
                  hit_rate:
                    description: Hit rate данного кэша (0.0 - 1.0)
                    type: number
                    format: double
                    minimum: 0
                    maximum: 1
                    example: 0.0
                  total_requests:
                    description: Общее количество запросов к кэшу
                    type: integer
                    format: int64
                    minimum: 0
                    example: 0
                  utilization:
                    description: Использование кэша (0.0 - 1.0)
                    type: number
                    format: double
                    minimum: 0
                    maximum: 1
                    example: 0.0
            overall_hit_rate:
              description: Общий hit rate всех кэшей (0.0 - 1.0)
              type: number
              format: double
              minimum: 0
              maximum: 1
              example: 0.0
            total_hits:
              description: Общее количество попаданий во все кэши
              type: integer
              format: int64
              minimum: 0
              example: 0
            total_misses:
              description: Общее количество промахов во все кэши
              type: integer
              format: int64
              minimum: 0
              example: 0
            total_evictions:
              description: Общее количество вытеснений из всех кэшей
              type: integer
              format: int64
              minimum: 0
              example: 0
            total_cache_size:
              description: Общий размер всех кэшей (количество элементов)
              type: integer
              minimum: 0
              example: 0
            max_cache_size:
              description: Максимальный общий размер всех кэшей
              type: integer
              minimum: 0
              example: 1500
            cache_utilization:
              description: Использование кэша (0.0 - 1.0)
              type: number
              format: double
              minimum: 0
              maximum: 1
              example: 0.0
            uptime_seconds:
              description: Время работы кэша в секундах
              type: integer
              format: int64
              minimum: 0
              example: 416
            message:
              description: Сообщение при отключённом кэше
              type: string
              example: Cache is disabled
            status:
              description: Статус при ошибке получения статистики
              type: string
              example: error
            error:
              description: Описание ошибки
              type: string
              example: Cache manager not available
        cache_summary:
          description: Краткая сводка по кэшу для быстрого просмотра
          type: object
          required:
            - enabled
          properties:
            enabled:
              description: Включен ли кэш
              type: boolean
              example: true
            hit_rate:
              description: Общий hit rate (0.0 - 1.0)
              type: number
              format: double
              minimum: 0
              maximum: 1
              example: 0.0
            total_size:
              description: Общий размер кэша (количество элементов)
              type: integer
              minimum: 0
              example: 0
            utilization:
              description: Использование кэша (0.0 - 1.0)
              type: number
              format: double
              minimum: 0
              maximum: 1
              example: 0.0
            status:
              description: Статус кэша (появляется при ошибках)
              type: string
              enum:
                - not_initialized
                - statistics_unavailable
                - error
